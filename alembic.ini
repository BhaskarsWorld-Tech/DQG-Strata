# Alembic configuration for DataGuard
#
# The database URL is built dynamically in migrations/env.py from the same
# Snowflake settings used by the app (SF_PLATFORM_ACCOUNT, SF_PLATFORM_USER, …).
# The sqlalchemy.url below is a placeholder only — env.py overrides it at runtime.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden by migrations/env.py using Snowflake settings from .env
sqlalchemy.url = snowflake://placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
