<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9050"/>
      <stop offset="55%" stop-color="#E8541A"/>
      <stop offset="100%" stop-color="#A82E06"/>
    </linearGradient>
  </defs>

  <!-- Orange gradient background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Q circle ring -->
  <circle cx="14.5" cy="13.5" r="7.5"
    stroke="white" stroke-width="2.2" fill="rgba(255,255,255,0.15)"/>

  <!-- Q tail — bold diagonal -->
  <line x1="19.8" y1="18.8" x2="27" y2="26"
    stroke="white" stroke-width="2.6" stroke-linecap="round"/>

  <!-- 4-pointed star — quality compass -->
  <path d="M14.5 8 L15.8 11.8 L19.5 13.5 L15.8 15.2 L14.5 19 L13.2 15.2 L9.5 13.5 L13.2 11.8 Z"
    fill="white"/>

  <!-- Crown dot at 12 o'clock -->
  <circle cx="14.5" cy="6" r="1.8" fill="white" opacity="0.9"/>
</svg>
